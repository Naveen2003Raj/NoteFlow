{% extends "index.html" %}
{% block content %}


<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center">
        <h2>Notes Making</h2>

        <!-- Add Button -->
        <button class="btn btn-primary" onclick="toggleForm()">➕</button>
    </div>

    <!-- Hidden Form -->
    <div id="noteForm" style="display:none;" class="mt-3">
        <form method="POST">
            {% csrf_token %}
            <textarea name="description" class="form-control" placeholder="Write your note..." required></textarea>
            <button class="btn btn-success mt-2">Save</button>
        </form>
    </div>

    <!-- Notes Grid -->
    <div class="row mt-4">

        {% for note in notes %}
        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow" style="background-color: #fff9c4;">
                
                <small>{{ note.date }}</small>
                <p>{{ note.description }}</p>
                 <div class="d-flex justify-content-between">
            <a href="{% url 'edit_note' note.id %}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{% url 'delete_note' note.id %}" class="btn btn-danger btn-sm">Delete</a>
        </div>
            </div>
        </div>
        {% empty %}
        <p>No notes yet...</p>
        {% endfor %}

    </div>

</div>

<script>
function toggleForm() {
    var form = document.getElementById("noteForm");
    form.style.display = form.style.display === "none" ? "block" : "none";
}
</script>

{% endblock %}
