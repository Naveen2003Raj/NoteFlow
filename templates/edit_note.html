{% extends "index.html" %}
{% block content %}

<div class="container mt-5">
    <h2>Edit Note</h2>

    <form method="POST">
        {% csrf_token %}
        <textarea name="description" class="form-control">{{ note.description }}</textarea>
        <button class="btn btn-success mt-3">Update</button>
    </form>

</div>

{% endblock %}
